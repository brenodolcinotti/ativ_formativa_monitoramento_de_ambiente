<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento Ambiental</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background: #3498db;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        button {
            padding: 10px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>🌡 Monitoramento Ambiental</h1>

    <div class="card">
        <h3>Última Leitura</h3>
        <p>Temperatura: {{ temp }} °C</p>
        <p>Umidade: {{ umidade }} %</p>
        <p>Total de registros: {{ quantidade }}</p>
    </div>

    <div class="card">
        <h3>📊 Dados do ThingSpeak</h3>

        <table>
            <tr>
                <th>Data</th>
                <th>Temperatura</th>
                <th>Umidade</th>
            </tr>

            {% for r in registros %}
            <tr>
                <td>{{ r.data }}</td>
                <td>{{ r.temperatura }}</td>
                <td>{{ r.umidade }}</td>
            </tr>
            {% endfor %}
        </table>

    </div>

</body>
</html>
